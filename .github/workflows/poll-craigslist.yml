name: Poll Craigslist

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      seed:
        description: "Mark current listings as seen without alerting"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      dry_run:
        description: "Print alerts instead of sending Telegram"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      max_alerts:
        description: "Max alerts this run"
        required: true
        default: "10"

permissions:
  contents: write

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}

concurrency:
  group: craigslist-poller
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dry-run smoke test
        run: python -m tests.test_dry_run

      - name: Poll Craigslist
        run: |
          ARGS="--source craigslist --verbose --max-alerts ${{ github.event.inputs.max_alerts || '10' }}"
          if [ "${{ github.event.inputs.seed || 'false' }}" = "true" ]; then ARGS="$ARGS --seed"; fi
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m src.poll $ARGS

      - name: Commit seen state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -n "$(git status --porcelain data/seen.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/seen.json
            git commit -m "update seen listings [skip ci]"
            git pull --rebase --autostash origin main
            git push
          else
            echo "No seen-state changes"
          fi
